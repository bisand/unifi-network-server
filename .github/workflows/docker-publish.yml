name: Build & Publish UniFi Network Server

on:
  workflow_dispatch:      # Manual trigger (always builds & publishes)
    inputs:
      version:
        description: 'UniFi version to build (leave blank to auto-detect the latest)'
        type: string
        default: ''
  schedule:
    - cron: '0 3 * * *'   # Daily at 03:00 UTC — only builds when a newer version exists

permissions:
  contents: write

# Never run two publishes at once (e.g. a manual run during the nightly one)
concurrency:
  group: publish-unifi
  cancel-in-progress: false

jobs:
  build-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Determine target version
        id: version
        run: |
          set -euo pipefail
          CURRENT="$(tr -d '[:space:]' < UNIFI_VERSION)"
          OVERRIDE="${{ github.event.inputs.version }}"
          if [ -n "$OVERRIDE" ]; then
            TARGET="$OVERRIDE"
            echo "Using version override: $TARGET"
          else
            curl -sSL -o unifi-install.html https://glennr.nl/s/unifi-network-controller
            TARGET="$(grep -oP 'unifi-\K[0-9]+\.[0-9]+\.[0-9]+' unifi-install.html | sort -V | tail -n1)"
            echo "Latest detected version: $TARGET"
          fi
          if [ -z "$TARGET" ]; then
            echo "::error::Could not determine a target UniFi version" >&2
            exit 1
          fi
          # Build on every manual dispatch, or when the detected version is newer than the committed one.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "$TARGET" != "$CURRENT" ]; then
            SHOULD_BUILD=true
          else
            SHOULD_BUILD=false
          fi
          echo "current=$CURRENT"           >> "$GITHUB_OUTPUT"
          echo "target=$TARGET"             >> "$GITHUB_OUTPUT"
          echo "should_build=$SHOULD_BUILD" >> "$GITHUB_OUTPUT"
          echo "### UniFi publish" >> "$GITHUB_STEP_SUMMARY"
          echo "- current: \`$CURRENT\`"     >> "$GITHUB_STEP_SUMMARY"
          echo "- target:  \`$TARGET\`"      >> "$GITHUB_STEP_SUMMARY"
          echo "- build:   \`$SHOULD_BUILD\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Docker Buildx
        if: steps.version.outputs.should_build == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.version.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        id: build
        if: steps.version.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            UNIFI_VERSION=${{ steps.version.outputs.target }}
          tags: |
            bisand/unifi-network-server:${{ steps.version.outputs.target }}
            bisand/unifi-network-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Only reached when the build+push above succeeded (implicit success() gate).
      # Commit the version bump AFTER a successful publish, never before.
      - name: Commit version bump
        if: steps.version.outputs.should_build == 'true' && steps.version.outputs.target != steps.version.outputs.current
        run: |
          set -euo pipefail
          echo "${{ steps.version.outputs.target }}" > UNIFI_VERSION
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add UNIFI_VERSION
          git commit -m "chore: update UNIFI_VERSION to ${{ steps.version.outputs.target }}"
          git push

      - name: Trigger Portainer redeploy
        if: steps.version.outputs.should_build == 'true'
        run: |
          set -euo pipefail
          echo "Triggering Portainer webhook..."
          curl -fsSL -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
          echo "Portainer webhook triggered."
